<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
    }
    
    h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #333;
    }
    
    p {
      margin: 0 0 15px 0;
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }
    
    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    
    button:hover {
      background: #0052a3;
    }
    
    button.secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    button.secondary:hover {
      background: #e0e0e0;
    }
    
    .status {
      padding: 8px;
      background: #f0f9ff;
      border-left: 3px solid #0066cc;
      border-radius: 3px;
      font-size: 12px;
      color: #333;
      margin-bottom: 15px;
    }
    
    .config {
      font-size: 11px;
      color: #999;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <h2>📝 Reflection Reminder</h2>
  
  <div class="status" id="status">
    Next reminder: <strong id="nextReminder">Loading...</strong>
  </div>
  
  <p>Get reminded every weekday at 3:00 PM to complete your daily teaching reflection.</p>
  
  <button id="openReflection">Open Reflection Tool</button>
  <button id="testNotification" class="secondary">Test Notification Now</button>
  
  <div class="config">
    Daily reminder: Weekdays at 3:00 PM<br>
    Weekends: Automatically skipped
  </div>
  
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
